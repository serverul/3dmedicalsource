<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DMedicalPlanner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; overflow: hidden; height: 100vh; }
#app { display: flex; height: 100vh; }

/* Left sidebar */
#sidebar {
  width: 280px; min-width: 280px; background: #12121a;
  border-right: 1px solid #2a2a3a; display: flex; flex-direction: column;
  overflow-y: auto; z-index: 10;
}
#sidebar h2 { font-size: 13px; color: #888; padding: 12px 14px 6px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #1e1e2e; }
.section { padding: 8px 14px; border-bottom: 1px solid #1e1e2e; }
.section label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
.section input, .section select, .section button {
  width: 100%; padding: 6px 8px; background: #1a1a2a; border: 1px solid #333;
  color: #e0e0e0; border-radius: 4px; font-size: 12px; margin-bottom: 6px;
}
.section button { background: #2a5a3a; border-color: #3a7a4a; cursor: pointer; font-weight: 600; }
.section button:hover { background: #3a7a4a; }
.section button.danger { background: #5a2a2a; border-color: #7a3a3a; }
.section button.danger:hover { background: #7a3a3a; }
.section-row { display: flex; gap: 6px; }
.section-row > * { flex: 1; }

/* Bone list */
#bone-list { flex: 1; overflow-y: auto; }
.bone-item {
  padding: 8px 14px; cursor: pointer; border-bottom: 1px solid #1a1a2a;
  display: flex; align-items: center; gap: 8px; font-size: 12px;
  transition: background 0.15s;
}
.bone-item:hover { background: #1a1a2a; }
.bone-item.selected { background: #1a2a3a; border-left: 3px solid #4a9aff; }
.bone-color { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
.bone-name { flex: 1; }
.bone-info { font-size: 10px; color: #666; }

/* Status bar */
#status {
  padding: 8px 14px; background: #0e0e16; border-top: 1px solid #2a2a3a;
  font-size: 11px; color: #666; display: flex; justify-content: space-between;
}

/* Main 3D area */
#viewer { flex: 1; position: relative; }
canvas { display: block; }

/* Gizmo toolbar */
#gizmo-toolbar {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px; background: rgba(20,20,30,0.85); padding: 4px 8px;
  border-radius: 6px; border: 1px solid #333; z-index: 10;
}
#gizmo-toolbar button {
  padding: 6px 12px; background: transparent; border: 1px solid transparent;
  color: #aaa; cursor: pointer; border-radius: 4px; font-size: 12px; font-weight: 600;
}
#gizmo-toolbar button:hover { background: #2a2a3a; }
#gizmo-toolbar button.active { background: #1a3a5a; color: #4a9aff; border-color: #4a9aff; }

/* Hotkey help */
#hotkeys {
  position: absolute; bottom: 12px; right: 12px;
  background: rgba(20,20,30,0.85); padding: 8px 12px; border-radius: 6px;
  border: 1px solid #333; font-size: 10px; color: #666; z-index: 10;
  max-width: 220px;
}
#hotkeys kbd { background: #2a2a3a; padding: 1px 4px; border-radius: 3px; color: #aaa; }

/* Loading overlay */
#loading {
  position: absolute; inset: 0; background: rgba(10,10,15,0.9);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100; font-size: 16px;
}
#loading.hidden { display: none; }
.spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #4a9aff;
  border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
#load-progress { margin-top: 8px; font-size: 12px; color: #666; }
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <h2>🦴 3DMedicalPlanner</h2>

    <div class="section">
      <label>DICOM Upload</label>
      <input type="file" id="dicom-input" webkitdirectory directory multiple accept=".dcm,.DCM,.ima,.IMA,application/dicom">
      <div class="section-row">
        <label><input type="checkbox" id="split-bones" checked> Split bones</label>
      </div>
      <button onclick="uploadDicom()">Upload & Segment</button>
    </div>

    <div class="section" id="transform-section" style="display:none">
      <label>Transform — <span id="selected-bone-name">none</span></label>
      <div class="section-row">
        <div><label>X</label><input type="number" id="tx" value="0" step="1" onchange="applyTransform()"></div>
        <div><label>Y</label><input type="number" id="ty" value="0" step="1" onchange="applyTransform()"></div>
        <div><label>Z</label><input type="number" id="tz" value="0" step="1" onchange="applyTransform()"></div>
      </div>
      <div class="section-row">
        <button onclick="resetTransform()">Reset</button>
        <button class="danger" onclick="deleteBone()">Delete</button>
      </div>
    </div>

    <div class="section">
      <label>Objects</label>
      <div class="section-row">
        <button onclick="selectAll()">Select All</button>
        <button onclick="deselectAll()">Deselect</button>
      </div>
    </div>

    <div id="bone-list"></div>

    <div id="status">
      <span id="status-text">Ready</span>
      <span id="bone-count"></span>
    </div>
  </div>

  <!-- 3D Viewer -->
  <div id="viewer">
    <div id="gizmo-toolbar">
      <button id="btn-translate" class="active" onclick="setGizmoMode('translate')" title="Move (G)">✥ Move</button>
      <button id="btn-rotate" onclick="setGizmoMode('rotate')" title="Rotate (R)">↻ Rotate</button>
      <button id="btn-scale" onclick="setGizmoMode('scale')" title="Scale (S)">⤡ Scale</button>
      <button onclick="duplicateBone()" title="Duplicate (Ctrl+D)">⧉ Clone</button>
      <button onclick="mirrorBone()" title="Mirror (M)">↔ Mirror</button>
    </div>
    <div id="hotkeys">
      <kbd>G</kbd> Move &nbsp; <kbd>R</kbd> Rotate &nbsp; <kbd>S</kbd> Scale<br>
      <kbd>Del</kbd> Delete &nbsp; <kbd>H</kbd> Hide &nbsp; <kbd>J</kbd> Transparent<br>
      <kbd>Ctrl+D</kbd> Clone &nbsp; <kbd>M</kbd> Mirror<br>
      <kbd>Esc</kbd> Deselect &nbsp; <kbd>F</kbd> Focus selected
    </div>
    <div id="loading"><div class="spinner"></div><div>Loading...</div><div id="load-progress"></div></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

// ===================== SCENE SETUP =====================
const container = document.getElementById('viewer');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);

const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 5000);
camera.position.set(0, 50, 200);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

// Lights — warm surgical lighting
const ambientLight = new THREE.AmbientLight(0x404050, 0.6);
scene.add(ambientLight);
const hemiLight = new THREE.HemisphereLight(0x8899bb, 0x443322, 0.5);
scene.add(hemiLight);
const dirLight1 = new THREE.DirectionalLight(0xffeedd, 1.2);
dirLight1.position.set(100, 200, 150);
dirLight1.castShadow = true;
scene.add(dirLight1);
const dirLight2 = new THREE.DirectionalLight(0xddddff, 0.6);
dirLight2.position.set(-100, -50, -100);
scene.add(dirLight2);

// Grid
const grid = new THREE.GridHelper(400, 40, 0x222233, 0x16161e);
scene.add(grid);

// ===================== CONTROLS =====================
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;
orbitControls.rotateSpeed = 0.8;

// TransformControls gizmo
const transformControls = new TransformControls(camera, renderer.domElement);
transformControls.setMode('translate');
transformControls.setSize(0.8);
scene.add(transformControls.getHelper());

transformControls.addEventListener('dragging-changed', (event) => {
  orbitControls.enabled = !event.value;
});

transformControls.addEventListener('objectChange', () => {
  // Update the transform inputs when dragging
  if (selectedBoneIndex >= 0 && selectedBoneIndex < boneObjects.length) {
    const obj = boneObjects[selectedBoneIndex].mesh;
    const orig = boneObjects[selectedBoneIndex].originalPosition;
    document.getElementById('tx').value = Math.round(obj.position.x - orig.x);
    document.getElementById('ty').value = Math.round(obj.position.y - orig.y);
    document.getElementById('tz').value = Math.round(obj.position.z - orig.z);
  }
});

// ===================== RAYCASTER (click to select) =====================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

container.addEventListener('click', (event) => {
  // Ignore if transform controls are being dragged
  if (transformControls.dragging) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Get all bone meshes
  const meshes = boneObjects.map(b => b.mesh);
  const intersects = raycaster.intersectObjects(meshes, false);

  if (intersects.length > 0) {
    const hitMesh = intersects[0].object;
    const idx = boneObjects.findIndex(b => b.mesh === hitMesh);
    if (idx >= 0) {
      selectBone(idx);
    }
  } else {
    deselectAll();
  }
});

// ===================== BONE DATA =====================
const BONE_COLORS = [
  0xE8D5B7, 0xD4C4A8, 0xC9B896, 0xBFA87A, 0xB59868,
  0xF5E6D0, 0xDBC8AA, 0xC4B08C, 0xAD9870, 0x9A8460,
  0xE0CDB0, 0xCCC09A, 0xB8A880, 0xA49068, 0x907850,
  0xF0DCC0, 0xD8C8A4, 0xC0B088, 0xA89870, 0x908058,
];

let boneObjects = []; // [{mesh, name, color, originalPosition, visible, transparent}]
let selectedBoneIndex = -1;

// ===================== UPLOAD =====================
window.uploadDicom = async function() {
  const input = document.getElementById('dicom-input');
  if (!input.files.length) { alert('Select a DICOM folder'); return; }

  const loading = document.getElementById('loading');
  const progress = document.getElementById('load-progress');
  loading.classList.remove('hidden');
  progress.textContent = 'Uploading DICOM files...';

  const formData = new FormData();
  const splitBones = document.getElementById('split-bones').checked;

  for (const file of input.files) {
    formData.append('files', file, file.webkitRelativePath || file.name);
  }
  formData.append('split_bones', splitBones ? 'true' : 'false');

  try {
    progress.textContent = 'Segmenting bones (this may take 30-60s)...';
    const resp = await fetch('/api/upload-dicom', { method: 'POST', body: formData });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(err.detail || 'Upload failed');
    }

    const data = await resp.json();
    progress.textContent = `Loading ${data.meshes.length} bone(s)...`;

    // Clear old bones
    clearBones();

    // Load each bone mesh
    for (let i = 0; i < data.meshes.length; i++) {
      const meshData = data.meshes[i];
      progress.textContent = `Loading bone ${i + 1}/${data.meshes.length}...`;
      await loadBoneMesh(meshData, i);
    }

    // Fit camera to all bones
    fitCameraToBones();

    document.getElementById('status-text').textContent =
      `Loaded ${data.meshes.length} bone(s) | Seg: ${data.segmentation?.method || 'default'}`;
    document.getElementById('bone-count').textContent =
      `${data.meshes.length} objects`;

    // Auto-select first bone
    if (boneObjects.length > 0) selectBone(0);

  } catch (e) {
    alert('Error: ' + e.message);
    document.getElementById('status-text').textContent = 'Error: ' + e.message;
  } finally {
    loading.classList.add('hidden');
  }
};

// ===================== LOAD BONE MESH =====================
async function loadBoneMesh(meshData, index) {
  const geo = new THREE.BufferGeometry();

  // Vertices
  const verts = new Float32Array(meshData.vertices.flat());
  geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));

  // Faces
  const indices = new Uint32Array(meshData.faces.flat());
  geo.setIndex(new THREE.BufferAttribute(indices, 1));
  geo.computeVertexNormals();

  // Material — bone-like PBR
  const color = BONE_COLORS[index % BONE_COLORS.length];
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.55,
    metalness: 0.05,
    side: THREE.DoubleSide,
    flatShading: false,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.name = meshData.name || `bone_${index}`;

  scene.add(mesh);

  boneObjects.push({
    mesh: mesh,
    name: meshData.name || `Bone ${index + 1}`,
    color: color,
    originalPosition: mesh.position.clone(),
    visible: true,
    transparent: false,
  });

  updateBoneList();
}

// ===================== SELECTION =====================
window.selectBone = function(index) {
  // Deselect previous
  if (selectedBoneIndex >= 0 && selectedBoneIndex < boneObjects.length) {
    const prev = boneObjects[selectedBoneIndex];
    prev.mesh.material.emissive.setHex(0x000000);
    prev.mesh.material.emissiveIntensity = 0;
  }

  selectedBoneIndex = index;

  if (index >= 0 && index < boneObjects.length) {
    const bone = boneObjects[index];

    // Highlight selected bone
    bone.mesh.material.emissive.setHex(0x1a3a5a);
    bone.mesh.material.emissiveIntensity = 0.4;

    // Attach transform controls
    transformControls.attach(bone.mesh);

    // Show transform section
    const section = document.getElementById('transform-section');
    section.style.display = 'block';
    document.getElementById('selected-bone-name').textContent = bone.name;

    // Update transform inputs
    const orig = bone.originalPosition;
    document.getElementById('tx').value = Math.round(bone.mesh.position.x - orig.x);
    document.getElementById('ty').value = Math.round(bone.mesh.position.y - orig.y);
    document.getElementById('tz').value = Math.round(bone.mesh.position.z - orig.z);

    // Focus camera on selected bone
    orbitControls.target.copy(bone.mesh.position);
  } else {
    transformControls.detach();
    document.getElementById('transform-section').style.display = 'none';
  }

  updateBoneList();
};

window.deselectAll = function() {
  selectBone(-1);
};

window.selectAll = function() {
  if (boneObjects.length > 0) selectBone(0);
};

// ===================== TRANSFORM =====================
window.setGizmoMode = function(mode) {
  transformControls.setMode(mode);
  document.querySelectorAll('#gizmo-toolbar button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode)?.classList.add('active');
};

window.applyTransform = function() {
  if (selectedBoneIndex < 0) return;
  const bone = boneObjects[selectedBoneIndex];
  const tx = parseFloat(document.getElementById('tx').value) || 0;
  const ty = parseFloat(document.getElementById('ty').value) || 0;
  const tz = parseFloat(document.getElementById('tz').value) || 0;
  bone.mesh.position.set(
    bone.originalPosition.x + tx,
    bone.originalPosition.y + ty,
    bone.originalPosition.z + tz,
  );
};

window.resetTransform = function() {
  if (selectedBoneIndex < 0) return;
  const bone = boneObjects[selectedBoneIndex];
  bone.mesh.position.copy(bone.originalPosition);
  bone.mesh.rotation.set(0, 0, 0);
  bone.mesh.scale.set(1, 1, 1);
  document.getElementById('tx').value = 0;
  document.getElementById('ty').value = 0;
  document.getElementById('tz').value = 0;
};

// ===================== BONE OPERATIONS =====================
window.deleteBone = function() {
  if (selectedBoneIndex < 0) return;
  const bone = boneObjects[selectedBoneIndex];
  transformControls.detach();
  scene.remove(bone.mesh);
  bone.mesh.geometry.dispose();
  bone.mesh.material.dispose();
  boneObjects.splice(selectedBoneIndex, 1);
  selectedBoneIndex = -1;
  document.getElementById('transform-section').style.display = 'none';
  updateBoneList();
};

window.duplicateBone = function() {
  if (selectedBoneIndex < 0) return;
  const src = boneObjects[selectedBoneIndex];
  const clone = src.mesh.clone();
  clone.material = src.mesh.material.clone();
  clone.position.x += 20; // Offset so it's visible
  clone.name = src.name + '_copy';
  scene.add(clone);

  boneObjects.push({
    mesh: clone,
    name: clone.name,
    color: src.color,
    originalPosition: clone.position.clone(),
    visible: true,
    transparent: false,
  });

  selectBone(boneObjects.length - 1);
  updateBoneList();
};

window.mirrorBone = function() {
  if (selectedBoneIndex < 0) return;
  const src = boneObjects[selectedBoneIndex];
  const mirror = src.mesh.clone();
  mirror.material = src.mesh.material.clone();
  mirror.scale.x *= -1; // Mirror on X axis
  mirror.name = src.name + '_mirror';
  scene.add(mirror);

  boneObjects.push({
    mesh: mirror,
    name: mirror.name,
    color: src.color,
    originalPosition: mirror.position.clone(),
    visible: true,
    transparent: false,
  });

  selectBone(boneObjects.length - 1);
  updateBoneList();
};

// ===================== VISIBILITY =====================
function toggleBoneVis(index) {
  const bone = boneObjects[index];
  bone.visible = !bone.visible;
  bone.mesh.visible = bone.visible;
  updateBoneList();
}

function toggleBoneTrans(index) {
  const bone = boneObjects[index];
  bone.transparent = !bone.transparent;
  bone.mesh.material.transparent = bone.transparent;
  bone.mesh.material.opacity = bone.transparent ? 0.3 : 1.0;
  bone.mesh.material.depthWrite = !bone.transparent;
  bone.mesh.material.needsUpdate = true;
  updateBoneList();
}

// ===================== BONE LIST UI =====================
function updateBoneList() {
  const container = document.getElementById('bone-list');
  container.innerHTML = boneObjects.map((b, i) => {
    const sel = i === selectedBoneIndex ? 'selected' : '';
    const vis = b.visible ? '👁' : '🚫';
    const trans = b.transparent ? 'T' : '';
    const colorHex = '#' + b.color.toString(16).padStart(6, '0');
    return `<div class="bone-item ${sel}" onclick="selectBone(${i})">
      <div class="bone-color" style="background:${colorHex}"></div>
      <span class="bone-name">${b.name} ${trans}</span>
      <span style="cursor:pointer" onclick="event.stopPropagation();toggleBoneVis(${i})">${vis}</span>
    </div>`;
  }).join('');

  document.getElementById('bone-count').textContent = `${boneObjects.length} objects`;
}

// Make functions global
window.toggleBoneVis = toggleBoneVis;
window.toggleBoneTrans = toggleBoneTrans;

// ===================== CLEAR =====================
function clearBones() {
  transformControls.detach();
  boneObjects.forEach(b => {
    scene.remove(b.mesh);
    b.mesh.geometry.dispose();
    b.mesh.material.dispose();
  });
  boneObjects = [];
  selectedBoneIndex = -1;
  document.getElementById('transform-section').style.display = 'none';
  updateBoneList();
}

// ===================== CAMERA =====================
function fitCameraToBones() {
  if (boneObjects.length === 0) return;
  const box = new THREE.Box3();
  boneObjects.forEach(b => box.expandByObject(b.mesh));
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim * 1.8;

  camera.position.set(center.x, center.y + dist * 0.3, center.z + dist);
  orbitControls.target.copy(center);
  camera.lookAt(center);
  orbitControls.update();
}

// Focus on selected bone
function focusSelectedBone() {
  if (selectedBoneIndex < 0) return;
  const bone = boneObjects[selectedBoneIndex];
  const box = new THREE.Box3().setFromObject(bone.mesh);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);

  orbitControls.target.copy(center);
  camera.position.set(center.x, center.y + maxDim * 0.5, center.z + maxDim * 2);
  camera.lookAt(center);
  orbitControls.update();
}

// ===================== KEYBOARD =====================
document.addEventListener('keydown', (e) => {
  // Don't capture if typing in input
  if (e.target.tagName === 'INPUT') return;

  switch(e.key) {
    case 'g': case 'G': setGizmoMode('translate'); break;
    case 'r': case 'R': setGizmoMode('rotate'); break;
    case 's': case 'S': setGizmoMode('scale'); break;
    case 'Delete': case 'Backspace': deleteBone(); e.preventDefault(); break;
    case 'h': case 'H': if (selectedBoneIndex >= 0) toggleBoneVis(selectedBoneIndex); break;
    case 'j': case 'J': if (selectedBoneIndex >= 0) toggleBoneTrans(selectedBoneIndex); break;
    case 'm': case 'M': mirrorBone(); break;
    case 'f': case 'F': focusSelectedBone(); break;
    case 'Escape': deselectAll(); break;
    case 'd':
      if (e.ctrlKey || e.metaKey) { duplicateBone(); e.preventDefault(); }
      break;
  }
});

// ===================== RESIZE =====================
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// ===================== RENDER LOOP =====================
function animate() {
  requestAnimationFrame(animate);
  orbitControls.update();
  renderer.render(scene, camera);
}
animate();

// Hide loading on startup
document.getElementById('loading').classList.add('hidden');
document.getElementById('status-text').textContent = 'Ready — upload DICOM to begin';

</script>
</body>
</html>
