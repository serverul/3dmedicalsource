<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3DMedicalPlanner</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e0e0e0;overflow:hidden;height:100vh}
#app{display:flex;height:100vh}

/* SIDEBAR */
#sidebar{width:300px;min-width:300px;background:#12121a;border-right:1px solid #2a2a3a;display:flex;flex-direction:column;overflow-y:auto;z-index:10}
#sidebar h2{font-size:13px;color:#888;padding:12px 14px 6px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #1e1e2e}
.section{padding:8px 14px;border-bottom:1px solid #1e1e2e}
.section label{display:block;font-size:11px;color:#888;margin-bottom:4px}
.section input,.section select,.section button{width:100%;padding:6px 8px;background:#1a1a2a;border:1px solid #333;color:#e0e0e0;border-radius:4px;font-size:12px;margin-bottom:6px}
.section button{background:#2a5a3a;border-color:#3a7a4a;cursor:pointer;font-weight:600}
.section button:hover{background:#3a7a4a}
.section button.active{background:#1a5a8a;border-color:#2a7aba}
.section button.danger{background:#5a2a2a;border-color:#7a3a3a}
.section-row{display:flex;gap:6px}
.section-row>*{flex:1}

/* Tool buttons */
.tool-group{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tool-btn{padding:6px 10px;background:#1a1a2a;border:1px solid #333;color:#aaa;cursor:pointer;border-radius:4px;font-size:11px;transition:all .15s}
.tool-btn:hover{background:#2a2a3a;color:#fff}
.tool-btn.active{background:#1a3a5a;color:#4a9aff;border-color:#4a9aff}

/* Bone list */
#bone-list{flex:1;overflow-y:auto}
.bone-item{padding:8px 14px;cursor:pointer;border-bottom:1px solid #1a1a2a;display:flex;align-items:center;gap:8px;font-size:12px;transition:background .15s}
.bone-item:hover{background:#1a1a2a}
.bone-item.selected{background:#1a2a3a;border-left:3px solid #4a9aff}
.bone-color{width:14px;height:14px;border-radius:3px;flex-shrink:0}

/* Status */
#status{padding:8px 14px;background:#0e0e16;border-top:1px solid #2a2a3a;font-size:11px;color:#666;display:flex;justify-content:space-between}

/* VIEWER */
#viewer{flex:1;position:relative}
canvas{display:block}

/* Toolbar */
#toolbar{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:rgba(20,20,30,0.9);padding:4px 8px;border-radius:6px;border:1px solid #333;z-index:10}
#toolbar button{padding:6px 12px;background:transparent;border:1px solid transparent;color:#aaa;cursor:pointer;border-radius:4px;font-size:12px;font-weight:600}
#toolbar button:hover{background:#2a2a3a}
#toolbar button.active{background:#1a3a5a;color:#4a9aff;border-color:#4a9aff}

/* Shape controls panel */
#shape-panel{position:absolute;top:60px;right:12px;background:rgba(20,20,30,0.95);padding:12px;border-radius:6px;border:1px solid #333;z-index:10;width:260px;font-size:12px}
#shape-panel.hidden{display:none}
#shape-panel h3{font-size:12px;color:#4a9aff;margin-bottom:8px}
#shape-panel label{display:block;color:#888;font-size:10px;margin-bottom:2px;margin-top:6px}
#shape-panel input[type=range]{width:100%;margin-bottom:4px}
#shape-panel .val{color:#4a9aff;font-size:11px}
#shape-panel .param-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
#shape-panel .param-row label{flex:1;margin:0}
#shape-panel .param-row input{width:80px;margin:0}

/* Measurements overlay */
#measurements{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(20,20,30,0.9);padding:8px 16px;border-radius:6px;border:1px solid #333;font-size:12px;z-index:10;white-space:nowrap}
#measurements.hidden{display:none}

/* Hotkeys */
#hotkeys{position:absolute;bottom:12px;right:12px;background:rgba(20,20,30,0.85);padding:8px 12px;border-radius:6px;border:1px solid #333;font-size:10px;color:#666;z-index:10;max-width:260px}
#hotkeys kbd{background:#2a2a3a;padding:1px 4px;border-radius:3px;color:#aaa}

/* Loading */
#loading{position:absolute;inset:0;background:rgba(10,10,15,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;font-size:16px}
#loading.hidden{display:none}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#4a9aff;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h2>🦴 3D Medical Planner</h2>

    <!-- Upload -->
    <div class="section">
      <label>DICOM Folder Upload</label>
      <input type="file" id="dicom-input" webkitdirectory directory multiple>
      <div class="section-row">
        <label style="font-size:11px"><input type="checkbox" id="split-bones" checked> Split bones (watershed)</label>
      </div>
      <button onclick="uploadDicom()">Upload DICOM Folder</button>
      <div style="margin-top:8px;border-top:1px solid #222;padding-top:8px">
        <label>STL File Upload</label>
        <input type="file" id="stl-input" accept=".stl,.obj,.ply">
        <button onclick="uploadSTL()">Upload STL/OBJ/PLY</button>
      </div>
    </div>

    <!-- Cutting Tools (JMesh-inspired) -->
    <div class="section">
      <label>Cutting Tools</label>
      <div class="tool-group">
        <div class="tool-btn active" data-tool="select" onclick="setTool('select')">🎯 Select</div>
        <div class="tool-btn" data-tool="rect-cut" onclick="setTool('rect-cut')">▭ Rectangle Cut</div>
        <div class="tool-btn" data-tool="circle-cut" onclick="setTool('circle-cut')">◯ Circle Cut</div>
        <div class="tool-btn" data-tool="line-cut" onclick="setTool('line-cut')">╱ Line Cut</div>
      </div>
      <div class="tool-group">
        <div class="tool-btn" onclick="executeSlice()" style="background:#2a3a2a;color:#6f6">✂️ Slice Bone</div>
        <div class="tool-btn" onclick="clearShape()">🗑 Clear Shape</div>
      </div>
    </div>

    <!-- Transform -->
    <div class="section" id="transform-section" style="display:none">
      <label>Transform — <span id="selected-name">none</span></label>
      <div class="section-row">
        <div><label>X</label><input type="number" id="tx" value="0" step="1" onchange="applyTransform()"></div>
        <div><label>Y</label><input type="number" id="ty" value="0" step="1" onchange="applyTransform()"></div>
        <div><label>Z</label><input type="number" id="tz" value="0" step="1" onchange="applyTransform()"></div>
      </div>
      <div class="section-row">
        <button onclick="resetTransform()">Reset</button>
        <button class="danger" onclick="deleteSelected()">Delete</button>
      </div>
    </div>

    <!-- Objects -->
    <div class="section"><label>Objects</label></div>
    <div id="bone-list"></div>
    <div id="status"><span id="status-text">Ready</span><span id="obj-count"></span></div>
  </div>

  <!-- 3D Viewer -->
  <div id="viewer">
    <div id="toolbar">
      <button id="btn-translate" class="active" onclick="setGizmo('translate')">✥ Move</button>
      <button id="btn-rotate" onclick="setGizmo('rotate')">↻ Rotate</button>
      <button onclick="duplicateSelected()">⧉ Clone</button>
      <button onclick="mirrorSelected()">↔ Mirror</button>
    </div>

    <!-- Shape parameters panel -->
    <div id="shape-panel" class="hidden">
      <h3 id="shape-title">▭ Rectangle Cut</h3>
      <div class="param-row">
        <label>Width</label>
        <input type="range" id="shape-width" min="10" max="200" value="60" oninput="updateShapeParam()">
        <span class="val" id="shape-width-val">60</span>
      </div>
      <div class="param-row">
        <label>Height</label>
        <input type="range" id="shape-height" min="10" max="200" value="40" oninput="updateShapeParam()">
        <span class="val" id="shape-height-val">40</span>
      </div>
      <div class="param-row">
        <label>Radius</label>
        <input type="range" id="shape-radius" min="5" max="200" value="30" oninput="updateShapeParam()">
        <span class="val" id="shape-radius-val">30</span>
      </div>
      <div class="param-row">
        <label>Extrude depth</label>
        <input type="range" id="shape-depth" min="1" max="100" value="50" oninput="updateShapeParam()">
        <span class="val" id="shape-depth-val">50</span>
      </div>
      <div class="param-row">
        <label>Snap offset</label>
        <input type="range" id="snap-offset" min="-10" max="10" value="0" step="0.5" oninput="updateShapeParam()">
        <span class="val" id="snap-offset-val">0</span>
      </div>
      <div style="margin-top:8px;display:flex;gap:4px">
        <button onclick="executeSlice()" style="flex:1;background:#2a3a2a;color:#6f6;font-size:11px;padding:6px;border:1px solid #3a5a3a;border-radius:4px;cursor:pointer">✂️ Execute Slice</button>
        <button onclick="clearShape()" style="flex:1;background:#3a2a2a;color:#f66;font-size:11px;padding:6px;border:1px solid #5a3a3a;border-radius:4px;cursor:pointer">Clear</button>
      </div>
    </div>

    <!-- Measurements -->
    <div id="measurements" class="hidden">
      <span id="measure-text"></span>
    </div>

    <div id="hotkeys">
      <kbd>1</kbd> Select &nbsp; <kbd>2</kbd> Rect &nbsp; <kbd>3</kbd> Circle &nbsp; <kbd>4</kbd> Line<br>
      <kbd>G</kbd> Move plane &nbsp; <kbd>R</kbd> Rotate plane<br>
      <kbd>E</kbd> Extrude &nbsp; <kbd>↑↓</kbd> Adjust extrude<br>
      <kbd>Enter</kbd> Slice &nbsp; <kbd>Esc</kbd> Clear/Cancel<br>
      <kbd>Del</kbd> Delete &nbsp; <kbd>F</kbd> Focus
    </div>

    <div id="loading"><div class="spinner"></div><div>Loading...</div><div id="load-progress"></div></div>
  </div>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}
</script>

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {TransformControls} from 'three/addons/controls/TransformControls.js';

// ============ SCENE ============
const container=document.getElementById('viewer');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a12);
const camera=new THREE.PerspectiveCamera(50,container.clientWidth/container.clientHeight,0.1,5000);
camera.position.set(0,50,200);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth,container.clientHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.localClippingEnabled=true;
container.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x404050,0.6));
scene.add(new THREE.HemisphereLight(0x8899bb,0x443322,0.5));
const dl1=new THREE.DirectionalLight(0xffeedd,1.2);dl1.position.set(100,200,150);scene.add(dl1);
const dl2=new THREE.DirectionalLight(0xddddff,0.6);dl2.position.set(-100,-50,-100);scene.add(dl2);
scene.add(new THREE.GridHelper(400,40,0x222233,0x16161e));

// ============ CONTROLS ============
const orbit=new OrbitControls(camera,renderer.domElement);
orbit.enableDamping=true;orbit.dampingFactor=0.08;
const gizmo=new TransformControls(camera,renderer.domElement);
gizmo.setMode('translate');gizmo.setSize(0.8);
scene.add(gizmo);
gizmo.addEventListener('dragging-changed',e=>{orbit.enabled=!e.value});
gizmo.addEventListener('objectChange',()=>{
  if(selectedIdx>=0&&selectedIdx<objects.length){
    const o=objects[selectedIdx];
    document.getElementById('tx').value=Math.round(o.mesh.position.x-o.origPos.x);
    document.getElementById('ty').value=Math.round(o.mesh.position.y-o.origPos.y);
    document.getElementById('tz').value=Math.round(o.mesh.position.z-o.origPos.z);
  }
});

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

// ============ STATE ============
const COLORS=[0xE8D5B7,0xD4C4A8,0xC9B896,0xBFA87A,0xB59868,0xF5E6D0,0xDBC8AA,0xC4B08C,0xAD9870,0x9A8460];
let objects=[];
let selectedIdx=-1;
let currentTool='select';
let caseId=null;

// Shape state (JMesh-inspired)
let activeShape=null; // THREE.Mesh - the cutting plane visualization
let shapeType='rect'; // rect|circle|line
let shapeOrigin=null; // Vector3 - center of shape on bone surface
let shapeNormal=null; // Vector3 - surface normal at click point
let shapePoints=[]; // Vector3[] - for line tool
let isMovingShape=false;
let isRotatingShape=false;
let isExtrudingShape=false;
let extrudeDepth=50;
let moveAxis=null; // 'X','Y','Z',null

// ============ TOOL MANAGEMENT ============
window.setTool=function(tool){
  currentTool=tool;
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b=>{
    b.classList.toggle('active',b.dataset.tool===tool);
  });
  if(tool==='rect-cut'||tool==='circle-cut'||tool==='line-cut'){
    shapeType=tool.replace('-cut','');
    clearShape();
    document.getElementById('shape-panel').classList.remove('hidden');
    document.getElementById('measurements').classList.remove('hidden');
    // Show relevant params
    document.getElementById('shape-width').parentElement.style.display=shapeType==='rect'?'flex':'none';
    document.getElementById('shape-height').parentElement.style.display=shapeType==='rect'?'flex':'none';
    document.getElementById('shape-radius').parentElement.style.display=shapeType==='circle'?'flex':'none';
    document.getElementById('shape-title').textContent=
      shapeType==='rect'?'▭ Rectangle Cut':shapeType==='circle'?'◯ Circle Cut':'╱ Line Cut';
    setStatus('Click on bone surface to place cutting shape');
  } else {
    document.getElementById('shape-panel').classList.add('hidden');
    document.getElementById('measurements').classList.add('hidden');
  }
};

// ============ CLICK HANDLER ============
container.addEventListener('click',e=>{
  if(gizmo.dragging)return;
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);

  if(currentTool==='select'){
    const meshes=objects.map(o=>o.mesh);
    const hits=raycaster.intersectObjects(meshes,false);
    if(hits.length>0){
      const idx=objects.findIndex(o=>o.mesh===hits[0].object);
      if(idx>=0)selectObject(idx);
    } else deselectAll();
  } else if(currentTool==='rect-cut'||currentTool==='circle-cut'||currentTool==='line-cut'){
    handleShapeClick();
  }
});

// ============ SHAPE CREATION (JMesh snap-to-surface) ============
function handleShapeClick(){
  const meshes=objects.map(o=>o.mesh);
  const hits=raycaster.intersectObjects(meshes,false);
  if(hits.length===0)return;

  const hit=hits[0];
  const point=hit.point.clone();
  const normal=hit.face.normal.clone().transformDirection(hit.object.matrixWorld).normalize();
  const offset=parseFloat(document.getElementById('snap-offset').value)||0;
  const origin=point.clone().add(normal.clone().multiplyScalar(offset));

  shapeOrigin=origin;
  shapeNormal=normal;

  createShapeVisual();
  setStatus('Shape placed — adjust size with sliders, then Slice');
}

function createShapeVisual(){
  clearShapeVisual();
  const w=parseFloat(document.getElementById('shape-width').value)||60;
  const h=parseFloat(document.getElementById('shape-height').value)||40;
  const r=parseFloat(document.getElementById('shape-radius').value)||30;
  extrudeDepth=parseFloat(document.getElementById('shape-depth').value)||50;

  let geo;
  if(shapeType==='rect'){
    geo=new THREE.PlaneGeometry(w,h);
  } else if(shapeType==='circle'){
    geo=new THREE.CircleGeometry(r,32);
  } else {
    // Line: thin rectangle
    geo=new THREE.PlaneGeometry(w,2);
  }

  const mat=new THREE.MeshBasicMaterial({
    color:0xff4444,transparent:true,opacity:0.25,
    side:THREE.DoubleSide,depthWrite:false
  });
  activeShape=new THREE.Mesh(geo,mat);
  activeShape.position.copy(shapeOrigin);

  // Orient shape to face the surface normal
  const up=new THREE.Vector3(0,0,1);
  const quat=new THREE.Quaternion().setFromUnitVectors(up,shapeNormal);
  activeShape.quaternion.copy(quat);

  // Add wireframe outline
  const edges=new THREE.EdgesGeometry(geo);
  const lineMat=new THREE.LineBasicMaterial({color:0xff6666,linewidth:2});
  const wireframe=new THREE.LineSegments(edges,lineMat);
  activeShape.add(wireframe);

  // Add extrusion volume (transparent box showing the cut depth)
  const depthGeo=new THREE.BoxGeometry(
    shapeType==='rect'?w:2*r,
    shapeType==='rect'?h:2*r,
    extrudeDepth
  );
  const depthMat=new THREE.MeshBasicMaterial({
    color:0xff4444,transparent:true,opacity:0.08,
    side:THREE.DoubleSide,depthWrite:false
  });
  const depthMesh=new THREE.Mesh(depthGeo,depthMat);
  depthMesh.position.z=-extrudeDepth/2;
  activeShape.add(depthMesh);

  // Add normal direction arrow
  const arrowDir=shapeNormal.clone().normalize();
  const arrowOrigin=shapeOrigin.clone();
  const arrow=new THREE.ArrowHelper(arrowDir,arrowOrigin,30,0xff0000,8,4);
  scene.add(arrow);
  activeShape.userData.arrow=arrow;

  scene.add(activeShape);
  updateMeasurements();
}

function clearShapeVisual(){
  if(activeShape){
    if(activeShape.userData.arrow)scene.remove(activeShape.userData.arrow);
    scene.remove(activeShape);
    if(activeShape.geometry)activeShape.geometry.dispose();
    if(activeShape.material)activeShape.material.dispose();
    activeShape=null;
  }
}

window.clearShape=function(){
  clearShapeVisual();
  shapeOrigin=null;
  shapeNormal=null;
  shapePoints=[];
  document.getElementById('measurements').classList.add('hidden');
  setStatus('Shape cleared');
};

// ============ SHAPE PARAMETER UPDATE ============
window.updateShapeParam=function(){
  document.getElementById('shape-width-val').textContent=document.getElementById('shape-width').value;
  document.getElementById('shape-height-val').textContent=document.getElementById('shape-height').value;
  document.getElementById('shape-radius-val').textContent=document.getElementById('shape-radius').value;
  document.getElementById('shape-depth-val').textContent=document.getElementById('shape-depth').value;
  document.getElementById('snap-offset-val').textContent=document.getElementById('snap-offset').value;
  extrudeDepth=parseFloat(document.getElementById('shape-depth').value)||50;
  if(activeShape&&shapeOrigin)createShapeVisual();
  updateMeasurements();
};

function updateMeasurements(){
  const el=document.getElementById('measurements');
  const text=document.getElementById('measure-text');
  if(!activeShape||!shapeOrigin){el.classList.add('hidden');return;}
  el.classList.remove('hidden');
  const w=parseFloat(document.getElementById('shape-width').value)||60;
  const h=parseFloat(document.getElementById('shape-height').value)||40;
  const r=parseFloat(document.getElementById('shape-radius').value)||30;
  const d=extrudeDepth;
  if(shapeType==='rect'){
    text.textContent=`Width: ${w}mm | Height: ${h}mm | Depth: ${d}mm`;
  } else if(shapeType==='circle'){
    text.textContent=`Radius: ${r}mm | Depth: ${d}mm`;
  } else {
    text.textContent=`Length: ${w}mm | Depth: ${d}mm`;
  }
}

// ============ SHAPE TRANSFORM (G/R/E like JMesh) ============
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;

  // Shape-specific keys
  if(activeShape&&shapeOrigin){
    if(e.key==='g'||e.key==='G'){isMovingShape=!isMovingShape;isRotatingShape=false;isExtrudingShape=false;
      setStatus(isMovingShape?'Moving shape — click to place, or use axis keys (X/Y/Z)':'Shape locked');return;}
    if(e.key==='r'||e.key==='R'){isRotatingShape=!isRotatingShape;isMovingShape=false;isExtrudingShape=false;
      setStatus(isRotatingShape?'Rotating shape — use mouse wheel or arrow keys':'Shape locked');return;}
    if(e.key==='e'||e.key==='E'){isExtrudingShape=!isExtrudingShape;isMovingShape=false;isRotatingShape=false;
      setStatus(isExtrudingShape?'Extruding — use ↑↓ arrows':'Shape locked');return;}
    if(isMovingShape){
      if(e.key==='x'||e.key==='X'){moveAxis='X';setStatus('Moving along X');return;}
      if(e.key==='y'||e.key==='Y'){moveAxis='Y';setStatus('Moving along Y');return;}
      if(e.key==='z'||e.key==='Z'){moveAxis='Z';setStatus('Moving along Z');return;}
      if(e.key==='n'||e.key==='N'){moveAxis=null;setStatus('Moving (free)');return;}
    }
    if(isExtrudingShape){
      if(e.key==='ArrowUp'){extrudeDepth=Math.min(200,extrudeDepth+5);
        document.getElementById('shape-depth').value=extrudeDepth;
        document.getElementById('shape-depth-val').textContent=extrudeDepth;
        createShapeVisual();updateMeasurements();return;}
      if(e.key==='ArrowDown'){extrudeDepth=Math.max(1,extrudeDepth-5);
        document.getElementById('shape-depth').value=extrudeDepth;
        document.getElementById('shape-depth-val').textContent=extrudeDepth;
        createShapeVisual();updateMeasurements();return;}
    }
    if(isRotatingShape){
      if(e.key==='ArrowUp'){rotateShape(15);return;}
      if(e.key==='ArrowDown'){rotateShape(-15);return;}
      if(e.key==='ArrowLeft'){rotateShape(15,'y');return;}
      if(e.key==='ArrowRight'){rotateShape(-15,'y');return;}
    }
  }

  // Global keys
  switch(e.key){
    case '1':setTool('select');break;
    case '2':setTool('rect-cut');break;
    case '3':setTool('circle-cut');break;
    case '4':setTool('line-cut');break;
    case 'g':case 'G':setGizmo('translate');break;
    case 'Enter':executeSlice();break;
    case 'Escape':if(activeShape){clearShape();}else{deselectAll();}break;
    case 'Delete':case 'Backspace':deleteSelected();e.preventDefault();break;
    case 'f':case 'F':if(selectedIdx>=0){orbit.target.copy(objects[selectedIdx].mesh.position);}break;
    case 'd':if(e.ctrlKey||e.metaKey){duplicateSelected();e.preventDefault();}break;
    case 'm':case 'M':mirrorSelected();break;
  }
});

// Mouse move for shape manipulation
container.addEventListener('mousemove',e=>{
  if(!activeShape||!shapeOrigin)return;
  if(isMovingShape){
    const rect=renderer.domElement.getBoundingClientRect();
    mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
    mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(mouse,camera);

    // Project mouse onto the shape's plane
    const plane=new THREE.Plane(shapeNormal.clone(),-shapeOrigin.dot(shapeNormal));
    const target=new THREE.Vector3();
    raycaster.ray.intersectPlane(plane,target);
    if(target){
      if(moveAxis==='X'){shapeOrigin.x=target.x;}
      else if(moveAxis==='Y'){shapeOrigin.y=target.y;}
      else if(moveAxis==='Z'){shapeOrigin.z=target.z;}
      else{shapeOrigin.copy(target);}
      createShapeVisual();
    }
  }
});

// Mouse wheel for rotation
container.addEventListener('wheel',e=>{
  if(!activeShape||!isRotatingShape)return;
  e.preventDefault();
  rotateShape(e.deltaY>0?15:-15);
},{passive:false});

function rotateShape(deg,axis){
  if(!activeShape)return;
  const rad=THREE.MathUtils.degToRad(deg);
  if(axis==='y'){
    activeShape.rotateOnWorldAxis(shapeNormal.clone().normalize(),rad);
  } else {
    // Get a perpendicular axis
    const perp=new THREE.Vector3(1,0,0);
    if(Math.abs(shapeNormal.dot(perp))>0.9)perp.set(0,1,0);
    const rotAxis=perp.cross(shapeNormal).normalize();
    activeShape.rotateOnWorldAxis(rotAxis,rad);
    shapeNormal.applyAxisAngle(rotAxis,rad).normalize();
    if(activeShape.userData.arrow){
      activeShape.userData.arrow.setDirection(shapeNormal.clone().normalize());
    }
  }
}

// ============ EXECUTE SLICE (Boolean Slice like JMesh) ============
window.executeSlice=async function(){
  if(!activeShape||!shapeOrigin||!shapeNormal){
    setStatus('Place a cutting shape first (tools 2-4)');
    return;
  }
  if(selectedIdx<0){setStatus('Select a bone first');return;}

  const obj=objects[selectedIdx];
  if(!obj.caseId||obj.boneIndex===undefined){
    setStatus('Can only slice bones from DICOM segmentation');
    return;
  }

  setStatus('Slicing bone...');
  const loading=document.getElementById('loading');
  const progress=document.getElementById('load-progress');
  loading.classList.remove('hidden');
  progress.textContent='Computing boolean slice...';

  try{
    const fd=new FormData();
    fd.append('case_id',obj.caseId);
    fd.append('bone_index',obj.boneIndex);
    fd.append('plane_origin',JSON.stringify([shapeOrigin.x,shapeOrigin.y,shapeOrigin.z]));
    fd.append('plane_normal',JSON.stringify([shapeNormal.x,shapeNormal.y,shapeNormal.z]));

    const resp=await fetch('/api/cut-bone',{method:'POST',body:fd});
    if(!resp.ok){
      const e=await resp.json().catch(()=>({detail:resp.statusText}));
      throw new Error(e.detail||'Slice failed');
    }
    const data=await resp.json();
    progress.textContent='Loading fragments...';

    const origColor=obj.color;
    const origName=obj.name;
    scene.remove(obj.mesh);obj.mesh.geometry.dispose();obj.mesh.material.dispose();
    objects.splice(selectedIdx,1);selectedIdx=-1;gizmo.detach();

    if(!data.positive.empty)addFragment(data.positive,origColor+0x222200,origName+'_pos',obj.caseId);
    if(!data.negative.empty)addFragment(data.negative,origColor-0x002200,origName+'_neg',obj.caseId);

    clearShape();
    updateBoneList();
    setStatus('Bone sliced into fragments');
  }catch(e){
    setStatus('Slice error: '+e.message);
  }finally{
    loading.classList.add('hidden');
  }
};

function addFragment(meshData,color,name,cId){
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(meshData.vertices.flat()),3));
  geo.setIndex(new THREE.BufferAttribute(new Uint32Array(meshData.faces.flat()),1));
  geo.computeVertexNormals();
  const mat=new THREE.MeshStandardMaterial({color:color&0xffffff,roughness:0.55,metalness:0.05,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(geo,mat);mesh.name=name;scene.add(mesh);
  objects.push({mesh,name,color:color&0xffffff,origPos:mesh.position.clone(),visible:true,transparent:false,caseId:cId,boneIndex:undefined});
  selectObject(objects.length-1);
}

// ============ OBJECT MANAGEMENT ============
window.selectObject=function(idx){
  if(selectedIdx>=0&&selectedIdx<objects.length){
    objects[selectedIdx].mesh.material.emissive.setHex(0x000000);
  }
  selectedIdx=idx;
  if(idx>=0&&idx<objects.length){
    const o=objects[idx];
    o.mesh.material.emissive.setHex(0x1a3a5a);
    o.mesh.material.emissiveIntensity=0.4;
    gizmo.attach(o.mesh);
    document.getElementById('transform-section').style.display='block';
    document.getElementById('selected-name').textContent=o.name;
    orbit.target.copy(o.mesh.position);
  }else{
    gizmo.detach();
    document.getElementById('transform-section').style.display='none';
  }
  updateBoneList();
};
window.deselectAll=function(){selectObject(-1)};

window.setGizmo=function(mode){gizmo.setMode(mode);
  document.querySelectorAll('#toolbar button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+mode)?.classList.add('active');};

window.applyTransform=function(){
  if(selectedIdx<0)return;const o=objects[selectedIdx];
  o.mesh.position.set(o.origPos.x+(parseFloat(document.getElementById('tx').value)||0),o.origPos.y+(parseFloat(document.getElementById('ty').value)||0),o.origPos.z+(parseFloat(document.getElementById('tz').value)||0));
};
window.resetTransform=function(){
  if(selectedIdx<0)return;const o=objects[selectedIdx];
  o.mesh.position.copy(o.origPos);o.mesh.rotation.set(0,0,0);o.mesh.scale.set(1,1,1);
  document.getElementById('tx').value=0;document.getElementById('ty').value=0;document.getElementById('tz').value=0;
};
window.deleteSelected=function(){
  if(selectedIdx<0)return;const o=objects[selectedIdx];
  gizmo.detach();scene.remove(o.mesh);o.mesh.geometry.dispose();o.mesh.material.dispose();
  objects.splice(selectedIdx,1);selectedIdx=-1;
  document.getElementById('transform-section').style.display='none';updateBoneList();
};
window.duplicateSelected=function(){
  if(selectedIdx<0)return;const src=objects[selectedIdx];
  const clone=src.mesh.clone();clone.material=src.mesh.material.clone();clone.position.x+=20;
  clone.name=src.name+'_copy';scene.add(clone);
  objects.push({mesh:clone,name:clone.name,color:src.color,origPos:clone.position.clone(),visible:true,transparent:false,caseId:src.caseId});
  selectObject(objects.length-1);updateBoneList();
};
window.mirrorSelected=function(){
  if(selectedIdx<0)return;const src=objects[selectedIdx];
  const mirror=src.mesh.clone();mirror.material=src.mesh.material.clone();mirror.scale.x*=-1;
  mirror.name=src.name+'_mirror';scene.add(mirror);
  objects.push({mesh:mirror,name:mirror.name,color:src.color,origPos:mirror.position.clone(),visible:true,transparent:false,caseId:src.caseId});
  selectObject(objects.length-1);updateBoneList();
};

function updateBoneList(){
  const el=document.getElementById('bone-list');
  el.innerHTML=objects.map((o,i)=>{
    const sel=i===selectedIdx?'selected':'';
    const hex='#'+o.color.toString(16).padStart(6,'0');
    return `<div class="bone-item ${sel}" onclick="selectObject(${i})"><div class="bone-color" style="background:${hex}"></div><span style="flex:1">${o.name}</span></div>`;
  }).join('');
  document.getElementById('obj-count').textContent=objects.length+' objects';
}

// ============ UPLOAD ============
window.uploadSTL=async function(){
  const input=document.getElementById('stl-input');
  if(!input.files.length){alert('Select an STL/OBJ/PLY file');return;}
  const loading=document.getElementById('loading');
  const progress=document.getElementById('load-progress');
  loading.classList.remove('hidden');progress.textContent='Uploading mesh...';
  const fd=new FormData();fd.append('file',input.files[0]);
  try{
    const resp=await fetch('/api/upload',{method:'POST',body:fd});
    if(!resp.ok){const e=await resp.json().catch(()=>({detail:resp.statusText}));throw new Error(e.detail);}
    const data=await resp.json();caseId=data.case_id;
    gizmo.detach();objects.forEach(o=>{scene.remove(o.mesh);o.mesh.geometry.dispose();o.mesh.material.dispose();});objects=[];selectedIdx=-1;
    const{STLLoader}=await import('three/addons/loaders/STLLoader.js');
    const loader=new STLLoader();
    const geo=await new Promise((res,rej)=>{loader.load(data.mesh_url,res,undefined,rej);});
    geo.computeVertexNormals();
    const mat=new THREE.MeshStandardMaterial({color:COLORS[0],roughness:0.55,metalness:0.05,side:THREE.DoubleSide});
    const mesh=new THREE.Mesh(geo,mat);mesh.name=input.files[0].name;scene.add(mesh);
    objects.push({mesh,name:input.files[0].name,color:COLORS[0],origPos:mesh.position.clone(),visible:true,transparent:false,caseId,boneIndex:0});
    fitCamera();selectObject(0);setStatus('Loaded: '+input.files[0].name);
  }catch(e){setStatus('Error: '+e.message);}finally{loading.classList.add('hidden');}
};

window.uploadDicom=async function(){
  const input=document.getElementById('dicom-input');
  const files=[...input.files];
  if(!files.length){alert('Select DICOM folder first.');return;}
  const loading=document.getElementById('loading');
  const progress=document.getElementById('load-progress');
  loading.classList.remove('hidden');
  progress.textContent='Uploading '+files.length+' files...';
  const fd=new FormData();
  for(const f of files){fd.append('files',f,f.webkitRelativePath||f.name);}
  fd.append('split_bones',document.getElementById('split-bones').checked?'true':'false');
  fd.append('sensitivity','high');
  try{
    progress.textContent='Segmenting bones (30-120s)...';
    const resp=await fetch('/api/upload-dicom-folder',{method:'POST',body:fd});
    if(!resp.ok){const e=await resp.json().catch(()=>({detail:resp.statusText}));throw new Error(e.detail||'Upload failed: '+resp.status);}
    const data=await resp.json();
    caseId=data.case_id;progress.textContent='Loading '+data.bone_count+' bone(s)...';
    gizmo.detach();objects.forEach(o=>{scene.remove(o.mesh);o.mesh.geometry.dispose();o.mesh.material.dispose();});objects=[];selectedIdx=-1;
    for(let i=0;i<data.bone_count;i++){
      progress.textContent='Loading bone '+(i+1)+'/'+data.bone_count+'...';
      const{STLLoader}=await import('three/addons/loaders/STLLoader.js');
      const loader=new STLLoader();
      const geo=await new Promise((res,rej)=>{loader.load('/api/cases/'+caseId+'/bone/'+i+'.stl',res,undefined,rej);});
      geo.computeVertexNormals();
      const color=COLORS[i%COLORS.length];
      const mat=new THREE.MeshStandardMaterial({color,roughness:0.55,metalness:0.05,side:THREE.DoubleSide});
      const mesh=new THREE.Mesh(geo,mat);mesh.name='bone_'+i;scene.add(mesh);
      objects.push({mesh,name:(data.bones[i]&&data.bones[i].name)||('Bone '+(i+1)),color,origPos:mesh.position.clone(),visible:true,transparent:false,caseId,boneIndex:i});
    }
    fitCamera();if(objects.length>0)selectObject(0);
    setStatus('Loaded '+data.bone_count+' bone(s) — case '+caseId);
  }catch(e){setStatus('Error: '+e.message);}finally{loading.classList.add('hidden');}
};

function fitCamera(){
  if(!objects.length)return;
  const box=new THREE.Box3();objects.forEach(o=>box.expandByObject(o.mesh));
  const center=box.getCenter(new THREE.Vector3());const size=box.getSize(new THREE.Vector3());
  const maxDim=Math.max(size.x,size.y,size.z);
  camera.position.set(center.x,center.y+maxDim*0.3,center.z+maxDim*1.8);
  orbit.target.copy(center);orbit.update();
}

function setStatus(msg){document.getElementById('status-text').textContent=msg;}

// ============ RESIZE & RENDER ============
window.addEventListener('resize',()=>{
  camera.aspect=container.clientWidth/container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth,container.clientHeight);
});
function animate(){requestAnimationFrame(animate);orbit.update();renderer.render(scene,camera);}
animate();
document.getElementById('loading').classList.add('hidden');
setStatus('Ready — upload DICOM or STL to begin');
</script>
</body>
